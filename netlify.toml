[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Set up functions v2 as default style
[functions]
  node_compat = true

# Rewrite API paths seamlessly so frontend /api/chat endpoints route directly to the Netlify serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Catch-all router for SPA Client routing in Vite (avoids 404s on refresh)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
